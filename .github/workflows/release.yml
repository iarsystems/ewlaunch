name: Build & Release

on:
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write   # required for releases

jobs:
  build-and-release:
    name: Build Windows package and publish release
    runs-on: windows-2022

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build with PyInstaller
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          mkdir ewlaunch

          pyinstaller --windowed ewlaunch_win.py --icon=ewlaunch.ico
          pyinstaller ewlaunch.py

          Move-Item dist/ewlaunch_win/ewlaunch_win.exe ewlaunch/
          Move-Item dist/ewlaunch/ewlaunch.exe ewlaunch/
          Move-Item dist/ewlaunch_win/_internal ewlaunch/

          Copy-Item installations.ini ewlaunch/
          Copy-Item ewlaunch.ini ewlaunch/
          Copy-Item add_context_menu.reg ewlaunch/
          Copy-Item remove_context_menu.reg ewlaunch/
          Copy-Item README.md ewlaunch/
          Copy-Item init_env.bat ewlaunch/
          Copy-Item init_shell.bat ewlaunch/

          Compress-Archive ewlaunch "ewlaunch-$env:VERSION_TAG.zip"

      # ------------------------------------------------------------
      # Release
      # ------------------------------------------------------------
      - name: Create GitHub release (if missing)
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" \
          || gh release create "${{ github.ref_name }}" \
               --title "Release ${{ github.ref_name }}" \
               --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      # - name: Verify build output
      #   shell: bash
      #   run: |
      #     pwd
      #     ls -lah

      - name: Upload release asset
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "./ewlaunch-${{ github.ref_name }}.zip" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
